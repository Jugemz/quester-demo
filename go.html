			"@context": "https://schema.org",
			"@type": "WebSite",

	<body>

		<!-- device rotation -->
		<div class = "div-rotate">
			<div class = "div-rotate-content">
				<img class = "img-rotate" src = "assets/website/rotate-device-example.png" alt = "example of a device in landscape mode">
				<p class = "p-rotate"><span class = "p-rotate--gold">Rotate your device!</span> Quester digital works best in landscape mode.</p>
			</div>
		</div>	

		<!-- website container -->
		<div class = "site-container">

			<!-- modal -->
			<section class = "modal modal--hidden">
				<div class = "modal__popup modal__popup--hidden style-border--default">
					<p class = "modal__x style-border--default">&#x2715</p>
					<p class = "modal__title"></p>
					<p class = "modal__paragraph"></p>
					<button class = "modal__button style-border--default"></button>
				</div>
				<div class = "modal__blackout modal__blackout--hidden"></div>
			</section>

			<!-- splash -->
			<section class = "splash splash--visible">
				<div class = "splash-container-wrapper">
					<div class = "keyboard--splash keyboard-splash--off-right">
						<div class = "keyboard-row keyboard-row--splash">
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>1</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>2</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>3</button>
						</div>
						<div class = "keyboard-row keyboard-row--splash">
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>4</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>5</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>6</button>
						</div>
						<div class = "keyboard-row keyboard-row--splash">
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>7</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>8</button>
							<button class = "keyboard-button keyboard-button--splash" ontouchstart>9</button>
						</div>
					</div>
				</div>
			</section>

			<!-- footer -->
			<section class = "footer footer--hidden">
				<div class = "footer-element footer-element-timer--visible" id = "footer-element-timer">
					<span class = "footer-element-time-label"></span>
					<p class = "footer-element-time-remaining">&nbsp</p>
				</div>
			</section>
	
			<!-- activity -->
			<section class = "activity state-display-none">
				<div class = "activity-modal activity-modal--close">
					<div class = "activity-modal-wrapper overflow-y-scroll">
						<div class = "activity-modal-content-container">
							<button class = "activity-modal-content-container-toggle activity-modal-content-container-toggle--hidden" ontouchstart></button>
							<div class = "activity-modal-content-container-top"></div>
							<div class = "activity-modal-content-container-bottom">
								<button class = "scroll-up" ontouchstart></button>
								<div class = "machine-container">
									<div class = "activity-modal-hint activity-modal-hint--hidden">
										<div class = "activity-modal-hint-container">
											<p class = "activity-modal-hint-text"></p>
											<button class = "activity-modal-hint-button" ontouchstart>CLOSE</button>
										</div>
									</div>
									<div class = "machine-column machine-column-left"></div>
									<div class = "machine-column machine-column-right"></div>
								</div>
							</div>
							<div class = "activity-modal-screen">
							</div>
							<div class = "activity-modal-code-machine">
								<button class = "activity-button-hint activity-button-hint--visible" ontouchstart></button>
								<button class = "activity-button-done activity-button-done--close" ontouchstart></button>
								<div class="keyboard">
									<div class="keyboard-row">
										<button class="keyboard-button" ontouchstart>A</button>
										<button class="keyboard-button" ontouchstart>B</button>
										<button class="keyboard-button" ontouchstart>C</button>
										<button class="keyboard-button" ontouchstart>D</button>
										<button class="keyboard-button" ontouchstart>E</button>
										<button class="keyboard-button" ontouchstart>F</button>
										<button class="keyboard-button" ontouchstart>G</button>
										<button class="keyboard-button" ontouchstart>H</button>
										<button class="keyboard-button" ontouchstart>I</button>
										<button class="keyboard-button" ontouchstart>J</button>
										<button class="keyboard-button" ontouchstart>K</button>
										<button class="keyboard-button" ontouchstart>L</button>
										<button class="keyboard-button" ontouchstart>M</button>
									</div>
									<div class="keyboard-row">					
										<button class="keyboard-button" ontouchstart>N</button>
										<button class="keyboard-button" ontouchstart>O</button>
										<button class="keyboard-button" ontouchstart>P</button>
										<button class="keyboard-button" ontouchstart>Q</button>
										<button class="keyboard-button" ontouchstart>R</button>
										<button class="keyboard-button" ontouchstart>S</button>
										<button class="keyboard-button" ontouchstart>T</button>
										<button class="keyboard-button" ontouchstart>U</button>
										<button class="keyboard-button" ontouchstart>V</button>
										<button class="keyboard-button" ontouchstart>W</button>
										<button class="keyboard-button" ontouchstart>X</button>
										<button class="keyboard-button" ontouchstart>Y</button>
										<button class="keyboard-button" ontouchstart>Z</button>
									</div>
								</div>								
							</div>
						</div>		

					</div>
						<button class = "button-close-modal" ontouchstart></button>
				</div>
				<div class = "activity-blackout activity-blackout--close"></div>
			</section>

			<!-- nodes -->
			<div class = "activity-node-container state-display-none"></div>	

		</div>
